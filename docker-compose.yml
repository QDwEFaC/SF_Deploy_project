services:
    api:
        build: .
        image: credit-api:latest
        container_name: credit-api
        restart: unless-stopped
        
    nginx:
        image: nginx:1.27-alpine
        container_name: credit-nginx
        depends_on:
            - api
        ports:
            - "8080:80"
        volumes:
            - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
        restart: unless-stopped